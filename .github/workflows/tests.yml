name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes; github.workflow
# keeps the group name unique per workflow automatically.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            server/requirements.txt
            server/requirements.dev.txt

      # ffmpeg is needed by the audio/video integration tests; without it they
      # skip rather than fail.
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      # -dev pulls in requirements.txt plus the test-only extras (pytest,
      # httpx for the full-stack websocket tests, lupa for the Lua suite).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.dev.txt

      # Exclude the YouTube-facing test: GitHub's datacenter IPs get bot-blocked,
      # so it can't run reliably in CI regardless of deno/node being present.
      - name: Run tests
        working-directory: server
        run: pytest -q -m "not youtube"
